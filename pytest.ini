[pytest]
# pytest configuration file

# Test directory
testpaths = tests

# File matching patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Default options
addopts =
    -v
    --tb=short
    --strict-markers
    -ra

# Markers definition
markers =
    slow: slow tests
    integration: integration tests
    requires_wechat: requires WeChat client
    requires_model: requires model files

# Log configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %H:%M:%S

# Ignore warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning