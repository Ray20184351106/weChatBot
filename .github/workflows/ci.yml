name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov pyyaml loguru
        # Skip Windows-specific dependencies on Linux
        pip install httpx python-dotenv pillow || true

    - name: Create data directories
      run: |
        mkdir -p data/chat_history
        mkdir -p data/logs
        mkdir -p data/models

    - name: Run tests
      run: |
        pytest tests/ -v --tb=short --cov=core --cov=training --cov-report=xml --cov-report=term-missing -m "not slow and not requires_wechat and not requires_model"
      continue-on-error: true

    - name: Upload coverage report
      uses: codecov/codecov-action@v4
      if: matrix.python-version == '3.11'
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install linters
      run: |
        pip install flake8 pylint
        pip install pyyaml loguru httpx python-dotenv pillow || true

    - name: Run flake8
      run: |
        flake8 core/ training/ --max-line-length=120 --ignore=E501,W503,E203 || true
      continue-on-error: true

    - name: Run pylint
      run: |
        pylint core/ training/ --disable=C0114,C0115,C0116,W0212,R0913,R0914 || true
      continue-on-error: true
